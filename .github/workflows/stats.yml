name: Generate GitHub stats card

on:
  schedule:
    - cron: "17 6 * * *"   # daily ~06:17 UTC
  workflow_dispatch:        # manual run button
  push:
    branches: [main]
    paths:
      - "scripts/generate-stats.mjs"
      - ".github/workflows/stats.yml"

permissions:
  contents: write

concurrency:
  group: stats
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate SVG
        env:
          # STATS_TOKEN is a personal access token (see README) so private
          # contributions are counted; falls back to the default token.
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: node scripts/generate-stats.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update GitHub stats card"
            git push
          fi
