<svg width="860" height="300" viewBox="0 0 860 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub stats for jp2images">
  <style>
    .title { font: 700 20px 'Segoe UI', Ubuntu, Sans-Serif; fill: #70a5fd; }
    .sub   { font: 400 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #565f89; }
    .lbl   { font: 400 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a9b1d6; }
    .val   { font: 700 14px 'Segoe UI', Ubuntu, Sans-Serif; }
    .lang  { font: 400 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a9b1d6; }
    .muted { fill: #565f89; }
    .hdr   { font: 700 13px 'Segoe UI', Ubuntu, Sans-Serif; fill: #bf91f3; letter-spacing: .5px; }
    .big   { font: 700 30px 'Segoe UI', Ubuntu, Sans-Serif; fill: #9ece6a; }
    .biglbl{ font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #565f89; }
  </style>
  <rect x="0.5" y="0.5" rx="10" width="859" height="299" fill="#1a1b27" stroke="#2a2c3f"/>

  <!-- Header -->
  <text x="30" y="42" class="title">Jeff Patterson's GitHub</text>
  <text x="30" y="62" class="sub">@jp2images  ·  Ankeny IA, USA  ·  11.6 yrs on GitHub  ·  5 followers  ·  79 repos</text>
  <line x1="30" y1="78" x2="830" y2="78" stroke="#2a2c3f"/>

  <!-- Left: core stats -->
  <g transform="translate(30, 108)">
    <text x="0" y="0" class="hdr">CORE STATS</text>
    
    <text x="0" y="30" class="lbl">Contributions (this year)</text>
    <text x="215" y="30" class="val" fill="#9ece6a" text-anchor="end">1,036</text>
    
    <text x="0" y="56" class="lbl">└ private (this year)</text>
    <text x="215" y="56" class="val" fill="#bf91f3" text-anchor="end">996</text>
    
    <text x="0" y="82" class="lbl">Commits (this year)</text>
    <text x="215" y="82" class="val" fill="#9ece6a" text-anchor="end">30</text>
    
    <text x="0" y="108" class="lbl">Pull requests (all time)</text>
    <text x="215" y="108" class="val" fill="#9ece6a" text-anchor="end">146</text>
    
    <text x="0" y="134" class="lbl">Issues (all time)</text>
    <text x="215" y="134" class="val" fill="#9ece6a" text-anchor="end">99</text>
    
    <text x="0" y="160" class="lbl">Total stars earned</text>
    <text x="215" y="160" class="val" fill="#9ece6a" text-anchor="end">5</text>
  </g>

  <!-- Divider -->
  <line x1="430" y1="92" x2="430" y2="270" stroke="#2a2c3f"/>

  <!-- Right top: streak -->
  <g transform="translate(470, 108)">
    <text x="0" y="0" class="hdr">ACTIVITY</text>
    <g transform="translate(0, 14)">
      <text x="0" y="32" class="big">1🔥</text>
      <text x="0" y="50" class="biglbl">current day streak</text>
    </g>
    <g transform="translate(180, 14)">
      <text x="0" y="32" class="big">20</text>
      <text x="0" y="50" class="biglbl">longest streak (1y)</text>
    </g>
  </g>

  <!-- Right bottom: languages -->
  <g transform="translate(470, 192)">
    <text x="0" y="0" class="hdr">TOP LANGUAGES</text>
    <g transform="translate(0, 14)">
      <clipPath id="r"><rect width="360" height="10" rx="5"/></clipPath>
      <g clip-path="url(#r)"><rect x="0" y="0" width="150.60" height="10" fill="#F05138"/><rect x="150.59911014304836" y="0" width="147.93" height="10" fill="#555555"/><rect x="298.53080600660184" y="0" width="29.43" height="10" fill="#e34c26"/><rect x="327.9603513600578" y="0" width="19.81" height="10" fill="#178600"/><rect x="347.77291799487006" y="0" width="6.80" height="10" fill="#012456"/><rect x="354.5772909907712" y="0" width="5.42" height="10" fill="#336790"/></g>
    </g>
    <g transform="translate(0, 36)">
    <circle cx="6" cy="6" r="5" fill="#F05138"/>
    <text x="18" y="10" class="lang">Swift <tspan class="muted">41.8%</tspan></text>
    <circle cx="181" cy="6" r="5" fill="#555555"/>
    <text x="193" y="10" class="lang">C <tspan class="muted">41.1%</tspan></text>
    <circle cx="6" cy="30" r="5" fill="#e34c26"/>
    <text x="18" y="34" class="lang">HTML <tspan class="muted">8.2%</tspan></text>
    <circle cx="181" cy="30" r="5" fill="#178600"/>
    <text x="193" y="34" class="lang">C# <tspan class="muted">5.5%</tspan></text>
    <circle cx="6" cy="54" r="5" fill="#012456"/>
    <text x="18" y="58" class="lang">PowerShell <tspan class="muted">1.9%</tspan></text>
    <circle cx="181" cy="54" r="5" fill="#336790"/>
    <text x="193" y="58" class="lang">PLpgSQL <tspan class="muted">1.5%</tspan></text></g>
  </g>

  <text x="30" y="284" class="sub">updated 2026-06-01</text>
</svg>